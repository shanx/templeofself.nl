<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d3e6f3"/>
      <stop offset="1" stop-color="#b4d0e4"/>
    </linearGradient>
  </defs>

  <!-- sky background -->
  <rect width="64" height="64" rx="13" fill="url(#sky)"/>

  <!-- ground / platform -->
  <ellipse cx="32" cy="56" rx="21" ry="4.5" fill="#3a342a"/>
  <ellipse cx="32" cy="53" rx="16" ry="3.4" fill="#4a4234"/>

  <!-- ground floor: glass body with wood frame -->
  <path d="M24 34 L40 34 L41.5 50 L22.5 50 Z" fill="#c6d2db"/>
  <g stroke="#6e5227" stroke-width="1.4">
    <line x1="28" y1="34" x2="27.2" y2="50"/>
    <line x1="32" y1="34" x2="32" y2="50"/>
    <line x1="36" y1="34" x2="36.8" y2="50"/>
  </g>
  <path d="M24 34 L40 34 L41.5 50 L22.5 50 Z" fill="none" stroke="#8a6a34" stroke-width="2"/>

  <!-- lower overhanging roof -->
  <path d="M14 34 L50 34 L44 27.5 L20 27.5 Z" fill="#7e6136"/>
  <path d="M14 34 L50 34 L44 27.5 L20 27.5 Z" fill="none" stroke="#5f492a" stroke-width="1"/>

  <!-- upper floor: smaller glass box -->
  <rect x="26" y="22" width="12" height="6" fill="#c6d2db"/>
  <g stroke="#6e5227" stroke-width="1.2">
    <line x1="30" y1="22" x2="30" y2="28"/>
    <line x1="34" y1="22" x2="34" y2="28"/>
  </g>
  <rect x="26" y="22" width="12" height="6" fill="none" stroke="#8a6a34" stroke-width="1.6"/>

  <!-- upper overhanging roof -->
  <path d="M18 22 L46 22 L41 16.5 L23 16.5 Z" fill="#8a6a3c"/>
  <path d="M18 22 L46 22 L41 16.5 L23 16.5 Z" fill="none" stroke="#5f492a" stroke-width="1"/>

  <!-- cupola drum + dome -->
  <rect x="29" y="11.5" width="6" height="5" fill="#8a6a3c"/>
  <path d="M28 12 A4 4 0 0 1 36 12 Z" fill="#b9bdc2"/>
  <circle cx="32" cy="7.5" r="1.1" fill="#b9bdc2"/>
</svg>
