<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Een nieuwe Tempel op Ruigoord</title>
        <link
            href="https://plugin.whydonate.com/wdplugin-style.css"
            rel="stylesheet"
            type="text/css"
        />
        <style>
            * {
                box-sizing: border-box;
            }
            html,
            body {
                margin: 0;
                padding: 0;
                background: #f5f5f5;
                font-family: Roboto, system-ui, sans-serif;
            }
            .page {
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 24px 16px;
            }
            h1 {
                color: #2e2c96;
                text-align: center;
                font-size: clamp(1.4rem, 5vw, 2.2rem);
                margin: 8px 0 24px;
            }
            .widget-wrap {
                width: 100%;
                max-width: 520px;
            }
            /* Keep embedded widget from overflowing on small screens */
            .share-widget,
            .share-widget * {
                max-width: 100%;
            }
            /* Hide the currency selector and the one-time/recurring interval toggle */
            .wd-part-currency-group,
            .wd-part-interval-group {
                display: none !important;
            }
        </style>
    </head>
    <body>
        <div class="page">
            <h1>New Temple for Ruigoord</h1>
            <div class="widget-wrap">
                <div
                    id="share-widget-new-temple-for-ruigoord"
                    class="share-widget"
                    data-slug="new-temple-for-ruigoord"
                    data-lang="en"
                    data-primary-color="#32BF55"
                    data-secondary-color="#2E2C96"
                    data-font-family="Roboto"
                    data-button-radius="27"
                    data-card-radius="21"
                    data-donation-amount-size="16"
                    data-button-text-size="20"
                    data-card="show"
                    data-form_mode="donation-form+image"
                ></div>
            </div>
        </div>
        <script
            src="https://plugin.whydonate.com/wp_styling.js"
            type="text/javascript"
        ></script>
    </body>
</html>
